<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry Mesuuu 🥺</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&amp;family=Pacifico&amp;display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="confetti-container"></div>

    <header class="hero">
        <div class="glass-panel">
            <h1 class="title">I'm Sorry, Mesuuu! 🥺</h1>
            <p class="subtitle">From your favorite Monkey, SHLOK.</p>
        </div>
    </header>

    <section class="animation-section">
        <div class="image-wrapper">
            <img src="assets/images/shlok_apologizing_1778118207458.png" alt="Shlok apologizing to Mesuuu"
                class="floating-img">
        </div>
        <p class="apology-text">I know I messed up, but please don't stay mad at me! 💔</p>
    </section>



    <section class="question-section" id="question-section">
        <h2>So... Will you forgive me?</h2>
        <div class="buttons">
            <button id="btn-yes" class="btn btn-primary">YES! 🥰</button>
            <button id="btn-no" class="btn btn-secondary">No 😡</button>
        </div>
    </section>

    <section id="success-message" class="hidden">
        <div class="glass-panel success-panel">
            <h2>YAYYYYY! 🎉</h2>
            <p>Thank you for forgiving me, Mesuuu! You're the best! ❤️<br>Get ready for a chocolate coming soon! kyare
                malvu che ???</p>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
